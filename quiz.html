<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Әдеби тест</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1f4037,#99f2c8);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.quiz-box{
background:white;
width:500px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-bottom:20px;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
background:#1f4037;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#145a52;
}

.next-btn{
background:#27ae60;
}

</style>
</head>

<body>

<div class="quiz-box">

<h1>Әдеби тест</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<button class="next-btn" onclick="nextQuestion()">Келесі сұрақ</button>

<p id="score"></p>

</div>

<script src="quiz.js"></script>

</body>
</html>
